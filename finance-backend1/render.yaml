services:
  - type: web
    name: finance-backend1
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/finance-backend1-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        sync: false
      - key: APP_SEED_ENABLED
        sync: false
