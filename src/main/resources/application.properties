# Server
server.port=8080

# Database — Supabase PostgreSQL (Replace placeholders with your credentials)
spring.datasource.url=jdbc:postgresql://db.YOUR-PROJECT-ID.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=YOUR-SUPABASE-DB-PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Connection pool — important for Supabase free tier limits
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JWT secret — must be at least 256 bits (32+ characters)
jwt.secret=your-very-long-secret-key-here-must-be-at-least-32-chars
jwt.expiration=86400000

# Swagger UI — disable security on docs endpoints
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
